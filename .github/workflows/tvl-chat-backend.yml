name: Build TVL Chat Backend

on:
  push:
    branches: [main]
    paths:
      - "chat/vps-backend/**"
      - "vendor/tinker-cookbook/**"
      - ".github/workflows/tvl-chat-backend.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare build context
        run: |
          mkdir -p chat/vps-backend/vendor
          cp -r vendor/tinker-cookbook chat/vps-backend/vendor/tinker-cookbook

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./chat/vps-backend
          file: ./chat/vps-backend/Dockerfile
          push: true
          tags: |
            ghcr.io/g-structure/tv/tvl-chat-backend:latest
            ghcr.io/g-structure/tv/tvl-chat-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
