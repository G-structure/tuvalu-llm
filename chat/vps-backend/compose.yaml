services:
  tvl-chat:
    image: ghcr.io/g-structure/tv/tvl-chat-backend:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:8787:8787"
    environment:
      - TINKER_API_KEY=${TINKER_API_KEY}
      - SAMPLER_PATH=${SAMPLER_PATH}
      - MODEL_NAME=${MODEL_NAME:-Qwen/Qwen3-30B-A3B}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8787/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
