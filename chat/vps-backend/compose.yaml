services:
  tvl-chat:
    image: ghcr.io/g-structure/tv/tvl-chat-backend:${TVL_CHAT_TAG:-latest}
    restart: unless-stopped
    ports:
      - "127.0.0.1:8787:8787"
    environment:
      - TINKER_API_KEY=${TINKER_API_KEY}
      - SAMPLER_PATH=${SAMPLER_PATH:-tinker://cd962896-a3c4-5b9f-94d7-b89e2a0cba17:train:0/sampler_weights/gen_eval_003000}
      - MODEL_NAME=${MODEL_NAME:-Qwen/Qwen3-30B-A3B}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8787/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
