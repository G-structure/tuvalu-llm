services:
  tvl-bridge:
    image: ghcr.io/g-structure/tv/tvl-bridge-backend:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:8788:8788"
    volumes:
      - ./prompts:/app/prompts:ro
    environment:
      - TINKER_API_KEY=${TINKER_API_KEY}
      - SAMPLER_PATH=${SAMPLER_PATH}
      - MODEL_NAME=${MODEL_NAME:-Qwen/Qwen3-30B-A3B}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL:-openai/gpt-4.1-nano}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8788/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
